services:
  postgres:
    image: postgres:16-alpine
    container_name: url_shortener_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: run the API in Docker too (`docker compose up`). For local dev you
  # can instead run only postgres and use `bun run dev` on the host.
  app:
    build: .
    container_name: url_shortener_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      BASE_URL: http://localhost:3000
      # Connects to the postgres service on the internal Docker network.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/url_shortener
      JWT_ACCESS_SECRET: change-me-access-secret
    ports:
      - "3000:3000"
    profiles: ["full"]

volumes:
  pgdata:
